# Color Palette (Perfected from 032.jpg)
$base = rgb(0d0f18)
$text = rgb(c0caf5)
$cyan = rgb(7dcfff) # Horizon Glow
$blue = rgb(7aa2f7)
$orange = rgb(ff9e64) # Watchtower Light
$purple = rgb(bb9af7) # Mountain Mist
$red = rgb(f7768e)

background {
    monitor =
    path = /home/init0/.config/backgrounds/032.jpg
    color = $base
    blur_passes = 0
    vibrancy = 0.1
    vibrancy_darkness = 0.1
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.25
    dots_center = true
    dots_rounding = -1
    
    # Using Cyan for the outer glow to match the horizon
    outer_color = rgba(125, 207, 255, 0.5) 
    inner_color = rgba(13, 15, 24, 0.6) 
    font_color = $text
    
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i><span foreground="##7dcfff">Welcome back, Mercyyy</span></i>
    hide_input = false
    rounding = 20 
    
    position = 0, -140
    halign = center
    valign = center
    
    check_color = $orange 
    fail_color = $red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $orange
}

# Clock (3D Depth Effect)
# Shadow/Depth Layer
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(13, 15, 24, 0.8) # Deep indigo depth
    font_size = 140
    font_family = Hack Nerd Font Bold
    position = 4, 116 # Slightly offset down and right
    halign = center
    valign = center
}

# Main Layer
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $text
    font_size = 140
    font_family = Hack Nerd Font Bold
    position = 0, 120
    halign = center
    valign = center
}

# Date (Layered with the mountains)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = $purple 
    font_size = 22
    font_family = Hack Nerd Font
    position = 0, 15
    halign = center
    valign = center
}

# Greeting (Requested style)
label {
    monitor =
    text = Welcome back, Mercyyy
    color = $text
    font_size = 20
    font_family = Hack Nerd Font
    position = 0, -80
    halign = center
    valign = center
}
