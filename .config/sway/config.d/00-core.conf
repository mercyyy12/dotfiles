set $mod Mod4
set $left h
set $down j
set $up k
set $right l
set $term kitty
set $menu bash $HOME/.config/rofi/launchers/launcher.sh
set $powermenu bash $HOME/.config/rofi/powermenu/powermenu.sh
set $gnome-schema org.gnome.desktop.interface
set $background_dir $HOME/.config/backgrounds

set $base      "#1a1b26"
set $mantle    "#16161e"
set $crust     "#0C0E14"
set $surface2  "#545c7e"
set $surface1  "#414868"
set $surface0  "#3b4261"
set $overlay2  "#737aa2"
set $overlay1  "#545c7e"
set $overlay0  "#565f89"
set $text      "#c0caf5"
set $subtext1  "#a9b1d6"
set $subtext0  "#a9b1d6"
set $red       "#f7768e"
set $peach     "#ff9e64"
set $green     "#9ece6a"
set $teal      "#73daca"
set $sky       "#89ddff"
set $sapphire  "#7dcfff"
set $blue      "#7aa2f7"
set $magenta   "#bb9af7"

# Hardware Inputs
input type:pointer {
      pointer_accel 0.3
}

input type:touchpad {
      dwt enabled
      tap enabled
      drag enabled
      drag_lock enabled
      natural_scroll enabled
      middle_emulation enabled
      pointer_accel 0.1
}

input type:keyboard {
      xkb_numlock enabled
}

# Displays
output eDP-1 {
    mode 1920x1200@143.89Hz
    scale 1
}
output * mode 1920x1200@143.89Hz

set $laptop eDP-1
bindswitch --reload --locked lid:on exec ~/.config/sway/scripts/lockman.sh, output $laptop disable
bindswitch --reload --locked lid:off output $laptop enable
